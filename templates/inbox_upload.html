<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Upload</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app_ui.css" rel="stylesheet">
</head>
<body class="app-shell">
  <div class="container py-4">
    {% include "_module_nav.html" %}
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0 page-header-title">Step 1. Upload</h4>
      <a href="/inbox/review" class="btn btn-sm btn-outline-primary">Next: Review</a>
    </div>
    <div class="card p-3">
      <input id="files" type="file" multiple class="form-control mb-2" accept=".jpg,.jpeg,.png,.webp,.heic">
      <button class="btn btn-primary" onclick="uploadReceipts()">Upload Receipts</button>
      <div id="msg" class="small mt-2 text-muted"></div>
    </div>
    <div class="mt-3">
      <a class="btn btn-outline-primary" href="/inbox/review">Go to Review</a>
    </div>
  </div>
  <script>
    async function uploadReceipts() {
      const inp = document.getElementById("files");
      if (!inp.files.length) return alert("Select files.");
      const fd = new FormData();
      for (const f of inp.files) fd.append("receipts", f);
      const r = await fetch("/api/inbox/upload", { method:"POST", body: fd });
      const d = await r.json();
      if (!r.ok) return alert(d.error || "Upload failed");
      document.getElementById("msg").textContent = `Uploaded ${d.count} files`;
      inp.value = "";
    }
  </script>
</body>
</html>
