<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Report Process - Review</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app_ui.css" rel="stylesheet">
</head>
<body class="app-shell">
  <div class="container-fluid py-3 px-3">
    {% include "_module_nav.html" %}
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0 page-header-title">Expense Report Process</h4>
      <a href="/reports" class="btn btn-sm btn-outline-secondary">Cancel</a>
    </div>
    {% set wizard_step = 2 %}{% include "_wizard_progress.html" %}

    <div class="card p-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0">Step 2. Review</h6>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-primary" onclick="saveSelection()">Save Selection</button>
          <button class="btn btn-sm btn-success" onclick="saveAllDirty()">Save All Dirty</button>
        </div>
      </div>
      <div id="progressSummary" class="small text-muted mb-2"></div>
      <div id="dirtySummary" class="small text-warning mb-2"></div>
      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead>
            <tr>
              <th><input type="checkbox" onchange="toggleAll(this)"></th>
              <th>Preview</th>
              <th>File</th>
              <th>Date</th>
              <th>Merchant</th>
              <th>Amount</th>
              <th>USD Amount</th>
              <th>Category</th>
              <th>Memo</th>
              <th>Status</th>
              <th>Lifecycle</th>
              <th>Dirty</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="border-top pt-2 mt-2">
        <div class="row g-2 align-items-end">
          <div class="col-md-3">
            <label class="form-label small mb-1">Default FX (to USD)</label>
            <input id="defaultFx" type="number" step="0.0001" min="0" class="form-control form-control-sm" value="1" oninput="saveFxState(); updateUsdAmounts();">
          </div>
          <div class="col-md-9">
            <label class="form-label small mb-1">Date-based FX Rates</label>
            <div class="d-flex align-items-center gap-2 mb-1">
              <button class="btn btn-sm btn-outline-primary" type="button" onclick="fetchRatesByDate()">Fetch by Date</button>
              <span class="small text-muted" id="fxUpdatedAt"></span>
            </div>
            <div id="fxEditor" class="small"></div>
          </div>
        </div>
      </div>
      <div class="d-flex justify-content-between mt-2">
        <a href="/reports/wizard/upload" class="btn btn-sm btn-outline-secondary">Back</a>
        <button class="btn btn-sm btn-primary" onclick="goNext()">Next: Generate</button>
      </div>
      <div id="msg" class="small text-muted mt-2"></div>
    </div>
  </div>
  <script>
    const KEY = "report_wizard_selected_ids_v1";
    const DIRTY_KEY = "report_wizard_dirty_ids_v1";
    const FX_KEY = "report_wizard_fx_by_date_v1";
    let rowsAll = [];
    let categoryChoices = [];

    function esc(v){return String(v||"").replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
    function wizardGet(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        if(!raw) return fallback;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === "object" && Object.prototype.hasOwnProperty.call(parsed, "value")) return parsed.value;
        return parsed;
      }catch(_){ return fallback; }
    }
    function wizardSet(key, value){
      try{ localStorage.setItem(key, JSON.stringify({ ts: Date.now(), value })); }catch(_){ }
    }
    function normalizeDateInput(v){
      const s = String(v || "").trim();
      if (!s) return "";
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      const mdY = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (mdY) {
        const mm = String(mdY[1]).padStart(2, "0");
        const dd = String(mdY[2]).padStart(2, "0");
        return `${mdY[3]}-${mm}-${dd}`;
      }
      return "";
    }
    function currencySymbol(code){
      const c = String(code || "USD").toUpperCase();
      const m = { USD: "$", KRW: "₩", EUR: "€", JPY: "¥", CNY: "¥", GBP: "£" };
      return m[c] || c;
    }
    function formatMoney(v){
      const n = Number(v || 0);
      return Number.isFinite(n) ? n.toLocaleString(undefined, { maximumFractionDigits: 2 }) : "0";
    }

    function getSavedSelection(){
      const v = wizardGet(KEY, []);
      return Array.isArray(v) ? v : [];
    }
    function getDirtySet(){
      return new Set((wizardGet(DIRTY_KEY, []) || []).map(Number).filter(Boolean));
    }
    function markDirty(tr){
      const id = Number(tr.dataset.id || 0);
      if (!id) return;
      tr.dataset.dirty = "1";
      tr.classList.add("table-active");
      const set = getDirtySet();
      set.add(id);
      wizardSet(DIRTY_KEY, [...set]);
      renderDirtySummary();
      updateUsdAmountForRow(tr);
    }
    function renderDirtySummary(){
      const cnt = getDirtySet().size;
      document.getElementById("dirtySummary").textContent = cnt ? `Unsaved edits: ${cnt}` : "";
    }

    function renderProgressSummary(){
      const out = { total: 0, uploaded: 0, needs_review: 0, ready: 0, assigned: 0 };
      for (const x of rowsAll) {
        out.total += 1;
        const lc = String(x.lifecycle_state || "").toUpperCase();
        if (lc === "UPLOADED") out.uploaded += 1;
        if (["NEEDS_REVIEW", "LOW_CONFIDENCE", "OCR_FAILED", "IMAGE_UNREADABLE"].includes(lc)) out.needs_review += 1;
        if (lc === "READY_FOR_REPORT") out.ready += 1;
        if (lc === "ASSIGNED_TO_REPORT") out.assigned += 1;
      }
      document.getElementById("progressSummary").textContent = `Total ${out.total} · Uploaded ${out.uploaded} · Needs Review ${out.needs_review} · Ready ${out.ready} · Assigned ${out.assigned}`;
    }

    async function loadCategories(){
      try{
        const r = await fetch("/api/config");
        const d = await r.json();
        if(!r.ok) return;
        categoryChoices = (d?.expense_types || []).filter(x => x && x.enabled && x.id).map(x => String(x.id || "").toUpperCase());
        if (!categoryChoices.length) categoryChoices = ["MISCELLANEOUS"];
      }catch(_){ }
    }
    function buildCategoryCell(row){
      const current = String(row.category || "MISCELLANEOUS").toUpperCase();
      const useCustom = !categoryChoices.includes(current);
      const opts = categoryChoices.map((c) => `<option value="${esc(c)}" ${c === current ? "selected" : ""}>${esc(c)}</option>`).join("");
      return `
        <div class="d-flex gap-1">
          <select class="form-select form-select-sm f-category-select" onchange="onCategoryChange(this)">
            ${opts}
            <option value="__CUSTOM__" ${useCustom ? "selected" : ""}>Custom...</option>
          </select>
          <input class="form-control form-control-sm f-category-custom" placeholder="CUSTOM CATEGORY" value="${useCustom ? esc(current) : ""}" style="${useCustom ? "" : "display:none;"}" oninput="markDirty(this.closest('tr'))">
        </div>
      `;
    }
    function onCategoryChange(sel){
      const tr = sel.closest("tr");
      const custom = tr.querySelector(".f-category-custom");
      if (sel.value === "__CUSTOM__") {
        custom.style.display = "";
      } else {
        custom.style.display = "none";
        custom.value = "";
      }
      markDirty(tr);
    }

    function buildAmountCell(row){
      const cur = String(row.currency || "USD").toUpperCase();
      const amount = Number(row.amount || 0);
      return `
        <div class="input-group input-group-sm">
          <span class="input-group-text f-currency-symbol" style="min-width:38px;">${esc(currencySymbol(cur))}</span>
          <input class="form-control form-control-sm f-amount text-end" type="number" min="0" step="0.01" value="${amount}" oninput="markDirty(this.closest('tr'))">
          <select class="form-select form-select-sm f-currency" style="max-width:92px;" onchange="syncCurrencySymbol(this); markDirty(this.closest('tr'));">
            ${["USD","KRW","EUR","JPY","CNY","GBP"].map((c)=>`<option value="${c}" ${c===cur?"selected":""}>${c}</option>`).join("")}
          </select>
        </div>
      `;
    }
    function syncCurrencySymbol(sel){
      const tr = sel.closest("tr");
      const sym = tr.querySelector(".f-currency-symbol");
      if (sym) sym.textContent = currencySymbol(sel.value);
      updateUsdAmountForRow(tr);
    }
    function getFxRate(dateIso, currency){
      const c = String(currency || "USD").toUpperCase();
      if (c === "USD") return 1;
      const fx = wizardGet(FX_KEY, {}) || {};
      const d = String(dateIso || "").trim();
      const byDate = (fx.rates || {})[d] || {};
      const specific = Number(byDate[c] || 0);
      if (specific > 0) return specific;
      const fallback = Number(fx.default_rate || document.getElementById("defaultFx")?.value || 1);
      return fallback > 0 ? fallback : 1;
    }
    function updateUsdAmountForRow(tr){
      if (!tr) return;
      const amount = Number(tr.querySelector(".f-amount")?.value || 0);
      const currency = String(tr.querySelector(".f-currency")?.value || "USD").toUpperCase();
      const dateIso = normalizeDateInput(tr.querySelector(".f-date")?.value || "");
      const rate = getFxRate(dateIso, currency);
      const usd = amount * rate;
      const el = tr.querySelector(".f-usd");
      if (el) el.textContent = `$ ${formatMoney(usd)}`;
    }
    function updateUsdAmounts(){
      document.querySelectorAll("#rows tr").forEach((tr)=>updateUsdAmountForRow(tr));
    }

    function renderRows(){
      let selected = new Set(getSavedSelection().map(Number));
      const autoSelectAll = selected.size === 0;
      if (autoSelectAll) selected = new Set(rowsAll.map((x)=>Number(x.id)));
      const dirtySet = getDirtySet();
      const body = document.getElementById("rows");
      body.innerHTML = rowsAll.map((x)=>`
        <tr data-id="${x.id}" data-dirty="${dirtySet.has(Number(x.id)) ? "1" : "0"}" class="${dirtySet.has(Number(x.id)) ? "table-active" : ""}">
          <td><input type="checkbox" class="sel" value="${x.id}" ${selected.has(Number(x.id)) ? "checked" : ""} onchange="saveSelection()"></td>
          <td><img src="/api/inbox/image/${Number(x.id)}" alt="preview" style="width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid #ddd;"></td>
          <td>${esc(x.orig_filename || "")}</td>
          <td><input class="form-control form-control-sm f-date" type="date" value="${esc(normalizeDateInput(x.date || ""))}" oninput="markDirty(this.closest('tr'))"></td>
          <td><input class="form-control form-control-sm f-merchant" value="${esc(x.merchant || "")}" oninput="markDirty(this.closest('tr'))"></td>
          <td>${buildAmountCell(x)}</td>
          <td class="text-end f-usd">$ 0</td>
          <td>${buildCategoryCell(x)}</td>
          <td><input class="form-control form-control-sm f-memo" value="${esc(x.memo || "")}" oninput="markDirty(this.closest('tr'))"></td>
          <td>${esc(x.status || "-")}</td>
          <td>${esc(x.lifecycle_state || "-")}</td>
          <td>${dirtySet.has(Number(x.id)) ? '<span class="badge text-bg-warning">Unsaved</span>' : '<span class="text-muted">-</span>'}</td>
        </tr>
      `).join("") || `<tr><td colspan="12" class="text-muted small">No receipts.</td></tr>`;
      if (autoSelectAll) wizardSet(KEY, [...selected]);
      renderDirtySummary();
      updateUsdAmounts();
    }

    async function loadRows(){
      const r = await fetch("/api/inbox/receipts?report_status=unassigned&limit=300");
      const d = await r.json();
      if(!r.ok) return alert(d.error||"Failed");
      rowsAll = d.receipts || [];
      renderProgressSummary();
      renderRows();
    }

    async function saveRowByTr(tr){
      const id = Number(tr.dataset.id || 0);
      if (!id) return;
      const body = {
        date: normalizeDateInput(tr.querySelector(".f-date").value.trim()),
        merchant: tr.querySelector(".f-merchant").value.trim(),
        amount: Number(tr.querySelector(".f-amount").value || 0),
        currency: tr.querySelector(".f-currency").value.trim().toUpperCase(),
        category: (() => {
          const sel = tr.querySelector(".f-category-select");
          const custom = tr.querySelector(".f-category-custom");
          if (!sel) return "MISCELLANEOUS";
          if (sel.value === "__CUSTOM__") return String(custom?.value || "MISCELLANEOUS").trim().toUpperCase() || "MISCELLANEOUS";
          return String(sel.value || "MISCELLANEOUS").trim().toUpperCase();
        })(),
        memo: tr.querySelector(".f-memo").value.trim(),
        status: "processed"
      };
      const r = await fetch(`/api/inbox/receipts/${id}`, {method:"PATCH", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body)});
      const d = await r.json();
      if(!r.ok) throw new Error(d.error || "Save failed");
      tr.dataset.dirty = "0";
      tr.classList.remove("table-active");
      const set = getDirtySet();
      set.delete(id);
      wizardSet(DIRTY_KEY, [...set]);
    }

    async function saveAllDirty(){
      const dirtyRows = [...document.querySelectorAll("#rows tr[data-dirty='1']")];
      if (!dirtyRows.length) {
        document.getElementById("msg").textContent = "No dirty rows.";
        return;
      }
      for (const tr of dirtyRows) await saveRowByTr(tr);
      document.getElementById("msg").textContent = `Saved ${dirtyRows.length} row(s).`;
      await loadRows();
    }

    function toggleAll(cb){
      document.querySelectorAll(".sel").forEach(x=>x.checked=cb.checked);
      saveSelection();
    }
    function saveSelection(){
      const ids = [...document.querySelectorAll(".sel:checked")].map(x=>Number(x.value));
      wizardSet(KEY, ids);
      renderFxEditor();
      saveFxState();
      updateUsdAmounts();
      document.getElementById("msg").textContent = "Selection saved.";
    }
    function getEffectiveRowsForFx(){
      const ids = new Set(getSavedSelection().map(Number));
      const selected = rowsAll.filter((r) => ids.has(Number(r.id)));
      return selected.length ? selected : rowsAll;
    }
    function renderFxEditor(){
      const rows = getEffectiveRowsForFx();
      const pairs = [];
      const seen = new Set();
      for (const r of rows){
        const d = normalizeDateInput(r.date || "");
        const c = String(r.currency || "").trim().toUpperCase();
        if (!d || !c || c === "USD") continue;
        const k = `${d}|${c}`;
        if (seen.has(k)) continue;
        seen.add(k);
        pairs.push({date:d, currency:c});
      }
      pairs.sort((a,b)=> a.date < b.date ? -1 : 1);
      const wrap = document.getElementById("fxEditor");
      if (!pairs.length){
        wrap.innerHTML = `<span class="text-muted">No dated non-USD receipts (selected/all).</span>`;
        return;
      }
      wrap.innerHTML = pairs.map((p,i)=>`
        <div class="d-flex align-items-center gap-2 mb-1">
          <span class="badge text-bg-light border">${esc(p.date)}</span>
          <span class="badge text-bg-light border">${esc(p.currency)} -> USD</span>
          <input id="fx-${i}" data-date="${esc(p.date)}" data-currency="${esc(p.currency)}" class="form-control form-control-sm" style="max-width:140px;" type="number" step="0.0001" min="0" value="" oninput="saveFxState(); updateUsdAmounts();">
        </div>
      `).join("");
      loadFxStateIntoEditor();
    }
    function saveFxState(){
      const payload = { default_rate: Number(document.getElementById("defaultFx").value || 1), rates: {} };
      document.querySelectorAll("#fxEditor input[data-date][data-currency]").forEach((el) => {
        const d = String(el.dataset.date || "").trim();
        const c = String(el.dataset.currency || "").trim().toUpperCase();
        const v = Number(el.value || 0);
        if (!d || !c || !Number.isFinite(v) || v <= 0) return;
        if (!payload.rates[d]) payload.rates[d] = {};
        payload.rates[d][c] = v;
      });
      wizardSet(FX_KEY, payload);
    }
    function loadFxStateIntoEditor(){
      const fx = wizardGet(FX_KEY, {}) || {};
      const rates = fx.rates || {};
      if (fx.default_rate) document.getElementById("defaultFx").value = fx.default_rate;
      document.querySelectorAll("#fxEditor input[data-date][data-currency]").forEach((el) => {
        const d = String(el.dataset.date || "").trim();
        const c = String(el.dataset.currency || "").trim().toUpperCase();
        if (rates[d] && rates[d][c]) el.value = String(rates[d][c]);
      });
    }
    async function fetchRatesByDate(){
      const inputs = [...document.querySelectorAll("#fxEditor input[data-date][data-currency]")];
      if (!inputs.length) return alert("No dated non-USD receipts available.");
      for (const el of inputs){
        const d = String(el.dataset.date || "");
        const c = String(el.dataset.currency || "");
        try{
          const r = await fetch(`https://api.frankfurter.app/${encodeURIComponent(d)}?from=USD&to=${encodeURIComponent(c)}`);
          const data = await r.json();
          const usdToCur = Number(data?.rates?.[c] || 0);
          if (usdToCur > 0) el.value = String((1 / usdToCur).toFixed(6));
        }catch(_){ }
      }
      saveFxState();
      updateUsdAmounts();
      document.getElementById("fxUpdatedAt").textContent = `Updated: ${new Date().toLocaleString()}`;
    }
    function goNext(){
      if (getDirtySet().size) {
        document.getElementById("msg").textContent = "Save all dirty rows first.";
        return;
      }
      saveSelection();
      window.location.href = "/reports/wizard/generate";
    }

    (async()=>{
      await loadCategories();
      await loadRows();
      renderFxEditor();
      loadFxStateIntoEditor();
      updateUsdAmounts();
    })();
  </script>
</body>
</html>
