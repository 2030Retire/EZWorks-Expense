<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Wizard - Settings</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app_ui.css" rel="stylesheet">
</head>
<body class="app-shell">
  <div class="container py-4">
    {% include "_module_nav.html" %}
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0 page-header-title">Create Report Wizard</h4>
      <a href="/reports" class="btn btn-sm btn-outline-secondary">Cancel</a>
    </div>
    {% set wizard_step = 1 %}{% include "_wizard_progress.html" %}

    <div class="card p-3">
      <h6 class="mb-3">Step 1. Start</h6>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label small">Expense Type</label>
          <select id="reportType" class="form-select form-select-sm"></select>
          <div class="form-text">Domestic / International mode.</div>
        </div>
        <div class="col-md-6">
          <label class="form-label small">Base Currency</label>
          <select id="currency" class="form-select form-select-sm">
            <option value="USD">USD</option>
            <option value="KRW">KRW</option>
            <option value="EUR">EUR</option>
            <option value="JPY">JPY</option>
            <option value="CNY">CNY</option>
            <option value="GBP">GBP</option>
            <option value="SGD">SGD</option>
            <option value="AUD">AUD</option>
            <option value="CAD">CAD</option>
            <option value="THB">THB</option>
            <option value="VND">VND</option>
          </select>
        </div>
      </div>

      <div class="d-flex justify-content-end mt-3">
        <button class="btn btn-primary btn-sm" onclick="saveAndNext()">Next: Upload + OCR</button>
      </div>
      <div id="saveStateMsg" class="small text-muted mt-2"></div>
    </div>
  </div>
  <script>
    const KEY = "report_wizard_settings_v2";

    function wizardGet(key, fallback){
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        const parsed = JSON.parse(raw);
        return (parsed && typeof parsed === "object" && Object.prototype.hasOwnProperty.call(parsed, "value")) ? parsed.value : parsed;
      } catch (_) {
        return fallback;
      }
    }
    function wizardSet(key, value){
      try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), value })); } catch (_) {}
    }
    function esc(v){return String(v||"").replace(/[&<>\"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[s]));}

    function applyTemplateRules(){
      const type = String(document.getElementById("reportType").value || "domestic").toLowerCase();
      const currency = document.getElementById("currency");
      if (type === "domestic") {
        currency.value = "USD";
        currency.disabled = true;
      } else {
        currency.disabled = false;
      }
    }

    async function loadWizardConfig(){
      try{
        const r = await fetch("/api/config");
        const d = await r.json();
        if(!r.ok) return;
        const typeSel = document.getElementById("reportType");
        const modeCfg = d?.modes || {};
        const options = [];
        if (modeCfg?.domestic?.enabled !== false) options.push({ value: "domestic", label: modeCfg?.domestic?.label || "Domestic" });
        if (modeCfg?.international?.enabled !== false) options.push({ value: "international", label: modeCfg?.international?.label || "International" });
        if (!options.length) options.push({ value: "domestic", label: "Domestic" });
        typeSel.innerHTML = options.map(x => `<option value="${esc(x.value)}">${esc(x.label)}</option>`).join("");

        const cfgDefaultType = String(d?.wizard?.default_report_type || options[0].value).toLowerCase();
        if ([...typeSel.options].some(o => o.value === cfgDefaultType)) typeSel.value = cfgDefaultType;
        const cfgDefaultCurrency = String(d?.wizard?.default_currency || "USD").toUpperCase();
        const cur = document.getElementById("currency");
        if ([...cur.options].some(o => o.value === cfgDefaultCurrency)) cur.value = cfgDefaultCurrency;
      }catch(_){ }
    }

    function loadSettings(){
      const s = wizardGet(KEY, {}) || {};
      if (s.reportType !== undefined) document.getElementById("reportType").value = s.reportType;
      if (s.currency !== undefined) document.getElementById("currency").value = s.currency;
      applyTemplateRules();
    }

    function saveSettings(showMsg = false){
      const s = wizardGet(KEY, {}) || {};
      s.reportType = (document.getElementById("reportType").value || "domestic").trim();
      s.currency = (document.getElementById("currency").value || "USD").trim().toUpperCase();
      wizardSet(KEY, s);
      if (showMsg) {
        const el = document.getElementById("saveStateMsg");
        if (el) el.textContent = `Saved at ${new Date().toLocaleTimeString()}`;
      }
    }

    function saveAndNext(){
      saveSettings(true);
      window.location.href = "/reports/wizard/upload";
    }

    (async()=>{
      await loadWizardConfig();
      loadSettings();
    })();

    document.getElementById("reportType").addEventListener("change", () => {
      applyTemplateRules();
      saveSettings(true);
    });
    document.getElementById("currency").addEventListener("change", () => saveSettings(true));
  </script>
</body>
</html>
