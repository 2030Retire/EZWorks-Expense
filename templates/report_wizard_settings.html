<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Wizard - Settings</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app_ui.css" rel="stylesheet">
</head>
<body class="app-shell">
  <div class="container py-4">
    {% include "_module_nav.html" %}
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0 page-header-title">Create Report Wizard</h4>
      <a href="/reports" class="btn btn-sm btn-outline-secondary">Cancel</a>
    </div>
    {% set wizard_step = 1 %}{% include "_wizard_progress.html" %}

    <div class="card p-3">
      <h6 class="mb-3">Step 1. Settings</h6>
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label small">Employee Name</label><input id="employeeName" class="form-control form-control-sm"></div>
        <div class="col-md-6"><label class="form-label small">Department</label><input id="department" class="form-control form-control-sm"></div>
        <div class="col-md-4"><label class="form-label small">Employee ID</label><input id="employeeId" class="form-control form-control-sm"></div>
        <div class="col-md-4"><label class="form-label small">Manager</label><input id="manager" class="form-control form-control-sm"></div>
        <div class="col-md-4"><label class="form-label small">Project</label><input id="project" class="form-control form-control-sm"></div>

        <div class="col-md-6"><label class="form-label small">Report Title</label><input id="reportTitle" class="form-control form-control-sm" placeholder="March expense report"></div>
        <div class="col-md-3">
          <label class="form-label small">Template</label>
          <select id="reportType" class="form-select form-select-sm"></select>
          <div class="form-text">Admin sets tenant templates. You can choose one per report.</div>
        </div>
        <div class="col-md-3">
          <label class="form-label small">Base Currency</label>
          <select id="currency" class="form-select form-select-sm">
            <option value="USD">USD</option>
            <option value="KRW">KRW</option>
            <option value="EUR">EUR</option>
            <option value="JPY">JPY</option>
            <option value="CNY">CNY</option>
            <option value="GBP">GBP</option>
            <option value="SGD">SGD</option>
            <option value="AUD">AUD</option>
            <option value="CAD">CAD</option>
            <option value="THB">THB</option>
            <option value="VND">VND</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label small">Expense Context</label>
          <select id="expenseContext" class="form-select form-select-sm">
            <option value="general">General Expense</option>
            <option value="travel">Business Trip</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label small">Period Input</label>
          <select id="periodMode" class="form-select form-select-sm">
            <option value="auto">Auto from receipts</option>
            <option value="manual">Manual input</option>
          </select>
        </div>
        <div class="col-md-6"><label class="form-label small">Expense Period (from)</label><input id="periodFrom" type="date" class="form-control form-control-sm"></div>
        <div class="col-md-6"><label class="form-label small">Expense Period (to)</label><input id="periodTo" type="date" class="form-control form-control-sm"></div>

        <div id="tripPurposeRow" class="col-md-12" style="display:none;"><label class="form-label small">Trip Purpose</label><input id="tripPurpose" class="form-control form-control-sm"></div>
        <div class="col-md-12"><label class="form-label small">Notes</label><textarea id="notes" rows="3" class="form-control form-control-sm"></textarea></div>
      </div>

      <div class="d-flex justify-content-end mt-3">
        <button class="btn btn-primary btn-sm" onclick="saveAndNext()">Next: Upload + OCR</button>
      </div>
      <div id="expiredNotice" class="alert alert-warning py-2 px-3 mt-2 small" style="display:none;"></div>
      <div id="saveStateMsg" class="small text-muted mt-2"></div>
    </div>
  </div>
  <script>
    const KEY = "report_wizard_settings_v2";
    const LEGACY_KEY = "report_wizard_settings_v1";
    const SELECT_KEY = "report_wizard_selected_ids_v1";
    const DIRTY_KEY = "report_wizard_dirty_ids_v1";
    const RISK_CONFIRM_KEY = "report_wizard_risk_confirmed_ids_v1";
    const FIELD_IDS = ["employeeName","department","employeeId","manager","project","reportTitle","reportType","currency","expenseContext","periodMode","periodFrom","periodTo","tripPurpose","notes"];
    let wizardTtlMs = 7 * 24 * 60 * 60 * 1000;
    let wizardExpired = false;
    const expiredKeys = new Set();
    const isKo = String(navigator.language || "").toLowerCase().startsWith("ko");

    function keyLabel(key){
      if (key === KEY || key === LEGACY_KEY) return "settings";
      return key;
    }
    function wizardGet(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        if(!raw) return fallback;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === "object" && Object.prototype.hasOwnProperty.call(parsed, "value") && Object.prototype.hasOwnProperty.call(parsed, "ts")) {
          const ts = Number(parsed.ts || 0);
          if (ts > 0 && (Date.now() - ts) > wizardTtlMs) {
            localStorage.removeItem(key);
            wizardExpired = true;
            expiredKeys.add(keyLabel(key));
            return fallback;
          }
          return parsed.value;
        }
        return parsed;
      }catch(_){
        return fallback;
      }
    }
    function wizardSet(key, value){
      try{ localStorage.setItem(key, JSON.stringify({ ts: Date.now(), value })); }catch(_){}
    }
    function esc(v){return String(v||"").replace(/[&<>\"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[s]));}
    function renderExpiredNotice(){
      const el = document.getElementById("expiredNotice");
      if (!el) return;
      if (wizardExpired) {
        el.style.display = "";
        const keys = [...expiredKeys];
        const msg = isKo
          ? `이전 Wizard 임시 상태가 만료되어 초기화되었습니다. (${keys.join(", ") || "state"})`
          : `Previous wizard draft expired and was reset. (${keys.join(", ") || "state"})`;
        const btn = isKo ? "Step 1로 초기화" : "Reset to Step 1";
        el.innerHTML = `${esc(msg)} <button class="btn btn-sm btn-outline-dark ms-2" onclick="resetWizardStateToStep1()">${esc(btn)}</button>`;
      } else {
        el.style.display = "none";
        el.innerHTML = "";
      }
    }
    function resetWizardStateToStep1(){
      [KEY, LEGACY_KEY, SELECT_KEY, DIRTY_KEY, RISK_CONFIRM_KEY].forEach((k)=>{ try{ localStorage.removeItem(k); }catch(_){} });
      window.location.href = "/reports/wizard/settings";
    }

    function applyTemplateRules(){
      const type = String(document.getElementById("reportType").value || "domestic").toLowerCase();
      const currency = document.getElementById("currency");
      if (type === "domestic") {
        currency.value = "USD";
        currency.disabled = true;
      } else {
        currency.disabled = false;
      }
    }
    function applyContextRules(){
      const context = String(document.getElementById("expenseContext").value || "general");
      const row = document.getElementById("tripPurposeRow");
      if (row) row.style.display = context === "travel" ? "" : "none";
      if (context !== "travel") document.getElementById("tripPurpose").value = "";
    }
    function applyPeriodModeRules(){
      const mode = String(document.getElementById("periodMode").value || "auto");
      const manual = mode === "manual";
      document.getElementById("periodFrom").disabled = !manual;
      document.getElementById("periodTo").disabled = !manual;
      if (!manual) {
        document.getElementById("periodFrom").value = "";
        document.getElementById("periodTo").value = "";
      }
    }

    async function loadWizardConfig(){
      try{
        const r = await fetch("/api/config");
        const d = await r.json();
        if(!r.ok) return;
        const hours = Number(d?.wizard?.cache_ttl_hours || 168);
        if (Number.isFinite(hours)) wizardTtlMs = Math.max(1, Math.min(24 * 30, Math.round(hours))) * 60 * 60 * 1000;

        const typeSel = document.getElementById("reportType");
        const modeCfg = d?.modes || {};
        const options = [];
        if (modeCfg?.domestic?.enabled !== false) options.push({ value: "domestic", label: modeCfg?.domestic?.label || "Domestic" });
        if (modeCfg?.international?.enabled !== false) options.push({ value: "international", label: modeCfg?.international?.label || "International" });
        if (!options.length) options.push({ value: "domestic", label: "Domestic" });
        typeSel.innerHTML = options.map(x => `<option value="${esc(x.value)}">${esc(x.label)}</option>`).join("");

        const cfgDefaultType = String(d?.wizard?.default_report_type || options[0].value).toLowerCase();
        if ([...typeSel.options].some(o => o.value === cfgDefaultType)) {
          typeSel.value = cfgDefaultType;
        }
        const cfgDefaultCurrency = String(d?.wizard?.default_currency || "USD").toUpperCase();
        const cur = document.getElementById("currency");
        if ([...cur.options].some(o => o.value === cfgDefaultCurrency)) cur.value = cfgDefaultCurrency;
      }catch(_){ }
    }

    function saveSettings(showMsg = false){
      const s = {};
      for(const id of FIELD_IDS){
        s[id] = (document.getElementById(id).value || "").trim();
      }
      wizardSet(KEY, s);
      if (showMsg) {
        const el = document.getElementById("saveStateMsg");
        if (el) el.textContent = `Saved at ${new Date().toLocaleTimeString()}`;
      }
    }
    function loadSettings(){
      try{
        const s = wizardGet(KEY, wizardGet(LEGACY_KEY, {}));
        for(const id of FIELD_IDS){
          if(document.getElementById(id) && s[id] !== undefined) document.getElementById(id).value = s[id];
        }
      }catch(_){ }
      applyTemplateRules();
      applyContextRules();
      applyPeriodModeRules();
    }
    function saveAndNext(){
      saveSettings(true);
      window.location.href = "/reports/wizard/upload";
    }

    (async()=>{
      await loadWizardConfig();
      loadSettings();
      renderExpiredNotice();
    })();

    FIELD_IDS.forEach((id)=>{
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("change", () => {
        if (id === "reportType") applyTemplateRules();
        if (id === "expenseContext") applyContextRules();
        if (id === "periodMode") applyPeriodModeRules();
        saveSettings(true);
      });
      el.addEventListener("blur", () => saveSettings(false));
    });
  </script>
</body>
</html>
