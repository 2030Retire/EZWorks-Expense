<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Report Process - Finalize</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app_ui.css" rel="stylesheet">
  <style>
    .wizard-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: .65rem;
    }
    .wizard-field-span-2, .wizard-field-span-3, .wizard-field-span-4, .wizard-field-span-6, .wizard-field-span-12 {
      min-width: 200px;
    }
    .wizard-field-span-2 { grid-column: span 2; }
    .wizard-field-span-3 { grid-column: span 3; }
    .wizard-field-span-4 { grid-column: span 4; }
    .wizard-field-span-6 { grid-column: span 6; }
    .wizard-field-span-12 { grid-column: span 12; min-width: 100%; }
    @media (max-width: 1200px) {
      .wizard-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
      .wizard-field-span-6, .wizard-field-span-12 { grid-column: span 6; }
      .wizard-field-span-4 { grid-column: span 3; }
      .wizard-field-span-3, .wizard-field-span-2 { grid-column: span 2; }
    }
    @media (max-width: 768px) {
      .wizard-grid { grid-template-columns: repeat(1, minmax(0, 1fr)); }
      .wizard-field-span-2, .wizard-field-span-3, .wizard-field-span-4, .wizard-field-span-6, .wizard-field-span-12 { grid-column: span 1; min-width: 0; }
    }
    .report-success-panel {
      border: 1px solid #bbf7d0;
      background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%);
      border-radius: 14px;
      box-shadow: 0 12px 24px rgba(22, 163, 74, .08);
    }
    .report-success-actions {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-top: .75rem;
    }
    .profile-context {
      border: 1px solid #dbe6f3;
      background: linear-gradient(180deg, #f8fbff 0%, #f2f7ff 100%);
      border-radius: 12px;
      padding: .75rem .9rem;
      margin-bottom: .75rem;
    }
    .profile-chip {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      border: 1px solid #c9dbf7;
      background: #fff;
      border-radius: 999px;
      padding: .2rem .55rem;
      font-size: .78rem;
      color: #36507a;
      margin-right: .35rem;
      margin-bottom: .35rem;
    }
  </style>
</head>
<body class="app-shell">
  <div class="container-fluid py-3 px-3">
    {% include "_module_nav.html" %}
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h4 class="mb-0 page-header-title">Expense Report Process</h4>
      <a href="/reports" class="btn btn-sm btn-outline-secondary">Cancel</a>
    </div>
    {% set wizard_step = 3 %}{% include "_wizard_progress.html" %}

    <div class="card p-3">
      <h6 class="mb-2">Step 3. Finalize Report</h6>
      <div class="small text-muted mb-2">Selected receipts: <span id="receiptCount">0</span> · <span id="progressSummary"></span></div>
      <div id="dirtyBanner" class="alert alert-warning py-2 px-3 small mb-2" style="display:none;">
        There are unsaved edits from Review. Save them first.
      </div>
      <div id="successBanner" class="report-success-panel py-3 px-3 mb-3" style="display:none;"></div>
      <div id="profileContext" class="profile-context" style="display:none;"></div>

      <div class="small fw-semibold mt-1 mb-1">Document Settings</div>
      <div class="wizard-grid mb-2">
        <div class="wizard-field-span-2"><label class="form-label small mb-1">Expense Type</label><input id="mode" class="form-control form-control-sm" readonly></div>
        <div class="wizard-field-span-2"><label class="form-label small mb-1">Base Currency</label><input id="currency" class="form-control form-control-sm" readonly></div>
        <div class="wizard-field-span-2"><label class="form-label small mb-1">Document Type</label><select id="documentType" class="form-select form-select-sm"></select></div>
        <div class="wizard-field-span-2"><label class="form-label small mb-1">Period Mode</label><select id="periodMode" class="form-select form-select-sm"><option value="auto">Auto (from receipts)</option><option value="manual">Manual</option></select></div>
        <div id="wrapPeriodFrom" class="wizard-field-span-2"><label class="form-label small mb-1">Expense Period (from)</label><input id="periodFrom" type="date" class="form-control form-control-sm"></div>
        <div id="wrapPeriodTo" class="wizard-field-span-2"><label class="form-label small mb-1">Expense Period (to)</label><input id="periodTo" type="date" class="form-control form-control-sm"></div>
      </div>

      <div class="small fw-semibold mt-2 mb-1">Basic Info</div>
      <div class="wizard-grid mb-2">
        <div id="wrapEmployeeName" class="wizard-field-span-3"><label class="form-label small mb-1">Employee Name <span class="text-danger">*</span></label><input id="employeeName" class="form-control form-control-sm" required></div>
        <div id="wrapDepartment" class="wizard-field-span-3"><label class="form-label small mb-1">Department</label><input id="department" class="form-control form-control-sm"></div>
        <div id="wrapEmployeeId" class="wizard-field-span-2"><label class="form-label small mb-1">Employee ID</label><input id="employeeId" class="form-control form-control-sm"></div>
        <div id="wrapManager" class="wizard-field-span-2"><label class="form-label small mb-1">Manager</label><input id="manager" class="form-control form-control-sm"></div>
        <div id="wrapManagerEmail" class="wizard-field-span-2"><label class="form-label small mb-1">Manager Email</label><input id="managerEmail" type="email" class="form-control form-control-sm" placeholder="manager@company.com"></div>
      </div>

      <div class="small fw-semibold mt-2 mb-1">Report Details</div>
      <div class="wizard-grid">
        <div class="wizard-field-span-6"><label class="form-label small mb-1">Title <span class="text-danger">*</span></label><input id="title" class="form-control form-control-sm" required></div>
        <div id="wrapProject" class="wizard-field-span-3"><label class="form-label small mb-1">Project</label><input id="project" class="form-control form-control-sm"></div>
        <div class="wizard-field-span-3"><label class="form-label small mb-1">Submission Date</label><input id="submitDate" type="date" class="form-control form-control-sm"></div>
        <div class="wizard-field-span-12"><label class="form-label small mb-1">Trip Purpose</label><textarea id="tripPurpose" class="form-control form-control-sm" rows="3"></textarea></div>
        <div class="wizard-field-span-12"><label class="form-label small mb-1">Notes</label><textarea id="notes" class="form-control form-control-sm" rows="3"></textarea></div>
      </div>

      <div class="d-flex justify-content-between mt-3">
        <a href="/reports/wizard/review" class="btn btn-sm btn-outline-secondary">Back</a>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-secondary" onclick="saveProfile()">Save Profile</button>
          <button class="btn btn-sm btn-success" onclick="generateReport()">Generate Report</button>
        </div>
      </div>
      <div id="msg" class="small mt-2"></div>
    </div>
  </div>
  <script>
    const SETTINGS_KEY = "report_wizard_settings_v2";
    const IDS_KEY = "report_wizard_selected_ids_v1";
    const DIRTY_KEY = "report_wizard_dirty_ids_v1";
    const FX_KEY = "report_wizard_fx_by_date_v1";
    let selectedRows = [];
    let cfg = {};
    let profileMeta = {};

    function esc(v){return String(v||"").replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
    function wizardGet(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        if(!raw) return fallback;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === "object" && Object.prototype.hasOwnProperty.call(parsed, "value")) return parsed.value;
        return parsed;
      }catch(_){ return fallback; }
    }

    function getSelectedIds(){
      const v = wizardGet(IDS_KEY, []);
      return Array.isArray(v) ? v : [];
    }
    function getSelectedDirtyIds(){
      const ids = new Set(getSelectedIds().map(Number));
      const dirty = wizardGet(DIRTY_KEY, []);
      return (dirty || []).map(Number).filter(x => x && ids.has(Number(x)));
    }

    function normalizeDateInput(v){
      const s = String(v || "").trim();
      if (!s) return "";
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      const mdY = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (mdY) {
        const mm = String(mdY[1]).padStart(2, "0");
        const dd = String(mdY[2]).padStart(2, "0");
        return `${mdY[3]}-${mm}-${dd}`;
      }
      return "";
    }

    function applyPeriodRules(){
      const mode = String(document.getElementById("periodMode").value || "auto");
      const fromEl = document.getElementById("periodFrom");
      const toEl = document.getElementById("periodTo");
      const dates = selectedRows.map((r)=>normalizeDateInput(r.date || "")).filter(Boolean).sort();
      if (mode === "auto") {
        fromEl.readOnly = true;
        toEl.readOnly = true;
        fromEl.value = dates[0] || "";
        toEl.value = dates[dates.length - 1] || "";
      } else {
        fromEl.readOnly = false;
        toEl.readOnly = false;
      }
    }

    function loadDocumentTypeOptions(){
      const sel = document.getElementById("documentType");
      const fromCfg = (cfg.document_types || []).filter((x)=>x && x.enabled !== false && x.id && x.label);
      const opts = fromCfg.length ? fromCfg : [{id:"expense_report", label:"Expense Report", enabled:true}];
      sel.innerHTML = opts.map((x)=>`<option value="${esc(x.label)}" data-doc-id="${esc(x.id)}">${esc(x.label)}</option>`).join("");
      applyDocumentTypeSuggestion();
    }
    function applyDocumentTypeSuggestion(){
      const docType = String(document.getElementById("documentType")?.value || "").trim();
      const titleEl = document.getElementById("title");
      if (!titleEl) return;
      titleEl.placeholder = docType ? `${docType} title` : "Report title";
      if (!String(titleEl.value || "").trim()) titleEl.value = docType;
    }

    async function loadSelectedSummary(){
      const ids = getSelectedIds();
      document.getElementById("receiptCount").textContent = ids.length;
      if (!ids.length) {
        document.getElementById("progressSummary").textContent = "No selected receipts";
        selectedRows = [];
        return;
      }
      const details = await Promise.all(ids.map(async (id) => {
        try {
          const r = await fetch(`/api/inbox/receipts/${id}`);
          const d = await r.json();
          return r.ok ? (d.receipt || null) : null;
        } catch (_) { return null; }
      }));
      selectedRows = details.filter(Boolean);
      const out = { risky: 0, ready: 0, assigned: 0 };
      for (const x of selectedRows) {
        const lc = String(x.lifecycle_state || "").toUpperCase();
        if (lc === "READY_FOR_REPORT") out.ready += 1;
        if (lc === "ASSIGNED_TO_REPORT") out.assigned += 1;
        if (["LOW_CONFIDENCE","OCR_FAILED","IMAGE_UNREADABLE","NEEDS_REVIEW"].includes(lc) || String(x.status || "") === "needs_review") out.risky += 1;
      }
      document.getElementById("progressSummary").textContent = `Risky ${out.risky} · Ready ${out.ready} · Assigned ${out.assigned}`;
    }

    async function loadProfile(){
      try{
        const r = await fetch("/api/profile");
        const d = await r.json();
        if(!r.ok) return;
        const p = d.profile || {};
        profileMeta = p;
        document.getElementById("employeeName").value = p.name || "";
        document.getElementById("department").value = p.department || "";
        document.getElementById("employeeId").value = p.employee_id || "";
        document.getElementById("manager").value = p.manager || "";
        document.getElementById("managerEmail").value = p.manager_email || "";
        renderProfileContext();
      }catch(_){ }
    }
    function renderProfileContext(){
      const wrap = document.getElementById("profileContext");
      if (!wrap) return;
      const provider = String(profileMeta.provider || "").trim().toLowerCase();
      const orgName = String(profileMeta.org_name || "").trim();
      const parts = [];
      if (provider) parts.push(`<span class="profile-chip">Source: ${esc(provider === "microsoft" ? "Microsoft 365" : provider)}</span>`);
      if (orgName) parts.push(`<span class="profile-chip">Organization: ${esc(orgName)}</span>`);
      if (profileMeta.email) parts.push(`<span class="profile-chip">User: ${esc(profileMeta.email)}</span>`);
      if (!parts.length) {
        wrap.style.display = "none";
        wrap.innerHTML = "";
        return;
      }
      wrap.style.display = "";
      wrap.innerHTML = `<div class="small fw-semibold mb-1">Profile Context</div><div>${parts.join("")}</div><div class="small text-muted mt-1">These profile values are used to prefill the report and can still be adjusted before generation.</div>`;
    }

    async function saveProfile(){
      const body = {
        name: document.getElementById("employeeName").value.trim(),
        department: document.getElementById("department").value.trim(),
        employee_id: document.getElementById("employeeId").value.trim(),
        manager: document.getElementById("manager").value.trim(),
        manager_email: document.getElementById("managerEmail").value.trim(),
      };
      const r = await fetch("/api/profile", { method:"PUT", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
      const d = await r.json();
      if(!r.ok) return alert(d.error || "Failed to save profile");
      document.getElementById("msg").innerHTML = `<span class="text-success">Profile saved.</span>`;
    }

    function loadBasicSettings(){
      const s = wizardGet(SETTINGS_KEY, {}) || {};
      document.getElementById("mode").value = (s.reportType || "domestic").toLowerCase();
      document.getElementById("currency").value = (s.currency || "USD").toUpperCase();
    }

    async function loadConfig(){
      try {
        const r = await fetch("/api/config");
        const d = await r.json();
        if (r.ok) cfg = d || {};
      } catch(_) {}
      loadDocumentTypeOptions();
      const fxPolicy = String(cfg?.accounting?.fx_policy || "date_based").toLowerCase();
      const fx = wizardGet(FX_KEY, {}) || {};
      if (!fx.rate_mode || fxPolicy !== "user_select") {
        fx.rate_mode = fxPolicy;
      }
      if (fxPolicy === "company_average") {
        fx.default_rate = Number(cfg?.accounting?.company_average_fx || fx.default_rate || 1);
      }
      try { localStorage.setItem(FX_KEY, JSON.stringify({ ts: Date.now(), value: fx })); } catch(_) {}
      applyFieldVisibility();
    }
    function setVisible(id, visible){
      const el = document.getElementById(id);
      if (!el) return;
      el.style.display = visible ? "" : "none";
    }
    function applyFieldVisibility(){
      const fields = cfg?.fields || {};
      const isEnabled = (key, fallback = true) => {
        if (Object.prototype.hasOwnProperty.call(fields, key)) return fields[key]?.enabled !== false;
        return fallback;
      };
      setVisible("wrapEmployeeName", isEnabled("employee_name"));
      setVisible("wrapDepartment", isEnabled("department"));
      setVisible("wrapEmployeeId", isEnabled("employee_id", false));
      setVisible("wrapManager", isEnabled("manager", false));
      setVisible("wrapManagerEmail", isEnabled("manager", false));
      setVisible("wrapProject", isEnabled("project", false));
      const periodEnabled = isEnabled("period");
      setVisible("wrapPeriodFrom", periodEnabled);
      setVisible("wrapPeriodTo", periodEnabled);
    }

    function setInvalid(el, flag){
      if (!el) return;
      if (flag) el.classList.add("is-invalid");
      else el.classList.remove("is-invalid");
    }

    function validateRequiredFields(){
      const employeeEl = document.getElementById("employeeName");
      const titleEl = document.getElementById("title");
      const employeeVisible = document.getElementById("wrapEmployeeName")?.style.display !== "none";
      const employeeOk = !employeeVisible || !!String(employeeEl.value || "").trim();
      const titleOk = !!String(titleEl.value || "").trim();
      setInvalid(employeeEl, !employeeOk);
      setInvalid(titleEl, !titleOk);
      if (!employeeOk || !titleOk) {
        alert("Employee Name and Title are required.");
        return false;
      }
      return true;
    }

    async function generateReport(){
      const dirty = getSelectedDirtyIds();
      if (dirty.length) return alert(`There are ${dirty.length} unsaved edits. Save in Review first.`);
      const ids = getSelectedIds();
      if (!ids.length) return alert("No selected receipts. Select receipts in Review first.");
      if (!validateRequiredFields()) return;

      const fx = wizardGet(FX_KEY, {}) || {};
      const rateMode = String(fx.rate_mode || cfg?.accounting?.fx_policy || "date_based").toLowerCase();
      const body = {
        mode: document.getElementById("mode").value,
        title: document.getElementById("title").value.trim(),
        document_type: document.getElementById("documentType").value.trim(),
        document_type_id: document.getElementById("documentType").selectedOptions?.[0]?.dataset?.docId || "",
        currency: document.getElementById("currency").value.trim().toUpperCase(),
        exchange_rate: Number(fx.default_rate || cfg?.accounting?.company_average_fx || 1),
        exchange_rates: rateMode === "date_based" ? (fx.rates || {}) : {},
        period_mode: document.getElementById("periodMode").value,
        receipt_ids: ids,
        employee_name: document.getElementById("employeeName").value.trim(),
        department: document.getElementById("department").value.trim(),
        employee_id: document.getElementById("employeeId").value.trim(),
        manager: document.getElementById("manager").value.trim(),
        manager_email: document.getElementById("managerEmail").value.trim(),
        project: document.getElementById("project").value.trim(),
        period_from: document.getElementById("periodFrom").value.trim(),
        period_to: document.getElementById("periodTo").value.trim(),
        submission_date: document.getElementById("submitDate").value.trim(),
        trip_purpose: document.getElementById("tripPurpose").value.trim(),
        notes: document.getElementById("notes").value.trim(),
      };
      const r = await fetch("/api/inbox/reports/generate", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body)});
      const d = await r.json();
      if(!r.ok) return alert(d.error || "Failed to generate report");
      localStorage.removeItem(IDS_KEY);
      localStorage.removeItem(DIRTY_KEY);
      const banner = document.getElementById("successBanner");
      banner.style.display = "";
      banner.innerHTML = `
        <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
          <div>
            <div class="fw-semibold mb-1">Report generated successfully</div>
            <div class="small text-muted">The file is ready for download and now appears in Reports history.</div>
            <div class="small mt-1"><span class="fw-semibold">File:</span> <a href="${d.download_url}">${esc(d.report.output_filename)}</a></div>
          </div>
          <span class="badge text-bg-success">Ready</span>
        </div>
        <div class="report-success-actions">
          <a class="btn btn-sm btn-success" href="${d.download_url}">Download file</a>
          <a class="btn btn-sm btn-outline-success" href="/reports">Open Reports</a>
          <a class="btn btn-sm btn-outline-secondary" href="/reports/wizard/upload">Start another report</a>
        </div>
      `;
      banner.scrollIntoView({ behavior: "smooth", block: "nearest" });
      document.getElementById("msg").innerHTML = `<span class="text-success">Generated: <a href="${d.download_url}">${esc(d.report.output_filename)}</a></span>`;
    }

    (async()=>{
      if (getSelectedDirtyIds().length) {
        document.getElementById("dirtyBanner").style.display = "";
      }
      document.getElementById("submitDate").value = new Date().toISOString().slice(0, 10);
      await loadConfig();
      loadBasicSettings();
      await loadProfile();
      await loadSelectedSummary();
      applyPeriodRules();
    })();

    document.getElementById("periodMode").addEventListener("change", applyPeriodRules);
    document.getElementById("documentType").addEventListener("change", applyDocumentTypeSuggestion);
    ["employeeName", "title"].forEach((id) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("input", () => setInvalid(el, !String(el.value || "").trim()));
    });
  </script>
</body>
</html>
