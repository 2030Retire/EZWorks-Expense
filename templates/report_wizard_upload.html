<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Wizard - Upload</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app_ui.css" rel="stylesheet">
</head>
<body class="app-shell">
  <div class="container py-4">
    {% include "_module_nav.html" %}
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0 page-header-title">Create Report Wizard</h4>
      <a href="/reports" class="btn btn-sm btn-outline-secondary">Cancel</a>
    </div>
    {% set wizard_step = 2 %}{% include "_wizard_progress.html" %}

    <div class="card p-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0">Step 2. Upload + OCR</h6>
        <button class="btn btn-sm btn-outline-primary" onclick="runOcrForPending()">Run OCR for Pending</button>
      </div>
      <div id="progressSummary" class="small text-muted mb-2"></div>

      <input id="files" type="file" multiple class="form-control mb-2" accept=".jpg,.jpeg,.png,.webp,.heic" onchange="analyzeSelectedFiles()">
      <div class="d-flex gap-2 mb-2">
        <button class="btn btn-primary btn-sm" onclick="uploadReceipts()">Upload</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="refreshRows()">Refresh</button>
      </div>

      <div class="progress mb-2" id="uploadProgressWrap" style="display:none; height:18px;">
        <div id="uploadProgressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%">0%</div>
      </div>

      <div id="qualityHints" class="small mb-2"></div>
      <div id="msg" class="small mt-1 text-muted"></div>

      <div class="table-responsive mt-3">
        <table class="table table-sm align-middle">
          <thead>
            <tr>
              <th>#</th>
              <th>Preview</th>
              <th>File</th>
              <th>Date</th>
              <th>Merchant</th>
              <th>Amount</th>
              <th>Currency</th>
              <th>Status</th>
              <th>Lifecycle</th>
              <th style="min-width:220px;">Action</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div class="d-flex justify-content-between mt-3">
        <a href="/reports/wizard/settings" class="btn btn-sm btn-outline-secondary">Back</a>
        <a href="/reports/wizard/review" class="btn btn-sm btn-primary">Next: Review</a>
      </div>
    </div>
  </div>
  <script>
    let rows = [];
    let uploading = false;
    function esc(v){return String(v||"").replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
    function summarizeLifecycle(items){
      const out = { total: 0, uploaded: 0, ocr: 0, needs_review: 0, ready: 0, assigned: 0 };
      for (const x of (items || [])) {
        out.total += 1;
        const lc = String(x.lifecycle_state || "").toUpperCase();
        if (lc === "UPLOADED") out.uploaded += 1;
        if (lc === "OCR_PROCESSING") out.ocr += 1;
        if (lc === "NEEDS_REVIEW" || lc === "LOW_CONFIDENCE" || lc === "OCR_FAILED" || lc === "IMAGE_UNREADABLE") out.needs_review += 1;
        if (lc === "READY_FOR_REPORT") out.ready += 1;
        if (lc === "ASSIGNED_TO_REPORT") out.assigned += 1;
      }
      return out;
    }
    function canRerunOcr(x){
      const lc = String(x.lifecycle_state || "").toUpperCase();
      if (lc === "READY_FOR_REPORT" || lc === "ASSIGNED_TO_REPORT") return false;
      const status = String(x.status || "").toLowerCase();
      const confidence = String(x.confidence || "").toLowerCase();
      const hasError = !!String(x.ocr_error || "").trim();
      if (status === "processed" && ["high","medium","manual"].includes(confidence) && !hasError) return false;
      return true;
    }
    function renderRows(){
      const body = document.getElementById("rows");
      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="10" class="small text-muted">No unassigned receipts yet.</td></tr>`;
        return;
      }
      body.innerHTML = rows.map((x, i) => {
        const canOcr = canRerunOcr(x);
        return `
          <tr>
            <td>${i + 1}</td>
            <td><img src="/api/inbox/image/${Number(x.id)}" alt="preview" style="width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid #ddd;"></td>
            <td>${esc(x.orig_filename || "")}</td>
            <td>${esc(x.date || "-")}</td>
            <td>${esc(x.merchant || "-")}</td>
            <td>${Number(x.amount || 0).toLocaleString()}</td>
            <td>${esc(x.currency || "-")}</td>
            <td>${esc(x.status || "-")}</td>
            <td>${esc(x.lifecycle_state || "-")}</td>
            <td>
              <button class="btn btn-sm btn-outline-primary" ${canOcr ? "" : "disabled"} onclick="runOcr(${Number(x.id)})">${canOcr ? "OCR" : "Done"}</button>
              <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteReceipt(${Number(x.id)})">Delete</button>
            </td>
          </tr>
        `;
      }).join("");
    }
    function renderSummary(){
      const s = summarizeLifecycle(rows);
      const el = document.getElementById("progressSummary");
      if (el) el.textContent = `Total ${s.total} · Uploaded ${s.uploaded} · OCR ${s.ocr} · Needs Review ${s.needs_review} · Ready ${s.ready} · Assigned ${s.assigned}`;
    }
    async function refreshRows(){
      const r = await fetch("/api/inbox/receipts?report_status=unassigned&limit=500");
      const d = await r.json();
      if (!r.ok) {
        document.getElementById("msg").innerHTML = `<span class="text-danger">${esc(d.error || "Failed to load receipts")}</span>`;
        return;
      }
      rows = d.receipts || [];
      renderSummary();
      renderRows();
    }

    function showUploadProgress(percent){
      const wrap = document.getElementById("uploadProgressWrap");
      const bar = document.getElementById("uploadProgressBar");
      wrap.style.display = "";
      bar.style.width = `${percent}%`;
      bar.textContent = `${percent}%`;
    }
    function hideUploadProgress(){
      const wrap = document.getElementById("uploadProgressWrap");
      const bar = document.getElementById("uploadProgressBar");
      bar.style.width = "0%";
      bar.textContent = "0%";
      wrap.style.display = "none";
    }

    async function analyzeSelectedFiles(){
      const inp = document.getElementById("files");
      const out = document.getElementById("qualityHints");
      const files = [...inp.files || []];
      if (!files.length) {
        out.innerHTML = "";
        return;
      }
      const rows = await Promise.all(files.map((f) => new Promise((resolve) => {
        const url = URL.createObjectURL(f);
        const img = new Image();
        img.onload = () => {
          const w = Number(img.naturalWidth || 0);
          const h = Number(img.naturalHeight || 0);
          URL.revokeObjectURL(url);
          const mp = (w * h) / 1000000;
          const lowRes = (w < 1200 || h < 1200 || mp < 1.2);
          resolve({ name: f.name, w, h, mb: (f.size / (1024*1024)), lowRes });
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          resolve({ name: f.name, w: 0, h: 0, mb: (f.size / (1024*1024)), lowRes: true });
        };
        img.src = url;
      })));
      const warns = rows.filter(x => x.lowRes);
      out.innerHTML = rows.map(x => {
        const badge = x.lowRes ? '<span class="badge text-bg-warning">Low OCR quality risk</span>' : '<span class="badge text-bg-success">OK</span>';
        return `<div>${badge} <span class="ms-1">${esc(x.name)} (${x.w}x${x.h}, ${x.mb.toFixed(2)}MB)</span></div>`;
      }).join("");
      if (warns.length) {
        out.innerHTML += `<div class="text-warning mt-1">${warns.length} file(s) may have low OCR accuracy. Consider retaking or replacing before OCR.</div>`;
      }
    }

    function uploadWithProgress(formData){
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/inbox/upload");
        xhr.upload.onprogress = (e) => {
          if (!e.lengthComputable) return;
          const p = Math.max(1, Math.min(99, Math.round((e.loaded / e.total) * 100)));
          showUploadProgress(p);
        };
        xhr.onload = () => {
          try {
            const data = JSON.parse(xhr.responseText || "{}");
            if (xhr.status >= 200 && xhr.status < 300) {
              showUploadProgress(100);
              resolve(data);
            } else {
              reject(new Error(data.error || "Upload failed"));
            }
          } catch (_) {
            reject(new Error("Upload failed"));
          }
        };
        xhr.onerror = () => reject(new Error("Network error during upload"));
        xhr.send(formData);
      });
    }

    async function uploadReceipts() {
      if (uploading) return;
      const inp = document.getElementById("files");
      if (!inp.files.length) return alert("Select files.");
      const fd = new FormData();
      for (const f of inp.files) fd.append("receipts", f);
      try {
        uploading = true;
        showUploadProgress(1);
        const d = await uploadWithProgress(fd);
        document.getElementById("msg").textContent = `Uploaded ${d.count} files`;
        inp.value = "";
        document.getElementById("qualityHints").innerHTML = "";
        await refreshRows();
      } catch (e) {
        alert(e.message || "Upload failed");
      } finally {
        uploading = false;
        setTimeout(hideUploadProgress, 500);
      }
    }
    async function runOcr(id){
      const target = rows.find(x => Number(x.id) === Number(id));
      if (target && !canRerunOcr(target)) {
        alert("Already OCR-processed. Re-run is blocked to prevent unnecessary API cost.");
        return;
      }
      const r = await fetch(`/api/inbox/ocr/${id}`, { method: "POST" });
      const d = await r.json();
      if (!r.ok) return alert(d.error || "OCR failed");
      await refreshRows();
    }
    async function runOcrForPending(){
      const targets = rows.filter(x => {
        const lc = String(x.lifecycle_state || "").toUpperCase();
        return canRerunOcr(x) && (lc === "UPLOADED" || lc === "NEEDS_REVIEW" || lc === "LOW_CONFIDENCE" || lc === "OCR_FAILED" || lc === "IMAGE_UNREADABLE");
      }).map(x => Number(x.id));
      if (!targets.length) return alert("No pending receipts for OCR.");
      for (const id of targets) {
        await runOcr(id);
      }
      await refreshRows();
    }
    async function deleteReceipt(id){
      if (!confirm("Delete this uploaded receipt?")) return;
      const r = await fetch(`/api/inbox/receipts/${id}`, { method: "DELETE" });
      const d = await r.json();
      if (!r.ok) return alert(d.error || "Delete failed");
      await refreshRows();
    }
    refreshRows();
  </script>
</body>
</html>
